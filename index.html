<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Ficha D&D Automática</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="top-info">
        <div class="container">
            <h2>Gerador de Ficha D&D</h2>


            <h3>Nome:</h3>
            <input id="name" placeholder="Nome do personagem">

            <div class="top-info">

                <div class="field">
                    <h3>Raça:</h3>
                    <select id="race">
                        <option>---</option>
                        <option>Aasimar</option>
                        <option>Anão</option>
                        <option>Draconato</option>
                        <option>Elfo</option>
                        <option>Gnomo</option>
                        <option>Golias</option>
                        <option>Humano</option>
                        <option>Orc</option>
                        <option>Pequenino</option>
                        <option>Tiferino</option>
                    </select>
                </div>

                <div class="field">
                    <h3>Antecedente:</h3>
                    <select id="background" onchange="updateBackgroundBonus()">
                        <option>---</option>
                        <option>Acólito</option>
                        <option>Andarilho</option>
                        <option>Artesão</option>
                        <option>Artista</option>
                        <option>Charlatão</option>
                        <option>Criminoso</option>
                        <option>Eremita</option>
                        <option>Mercador</option>
                        <option>Escriba</option>
                        <option>Nobre</option>
                        <option>Fazendeiro</option>
                        <option>Sábio</option>
                        <option>Guarda</option>
                        <option>Soldado</option>
                        <option>Guia</option>
                        <option>Marinheiro</option>
                    </select>
                </div>

            </div>

            <div class="info">

                <div class="attr">
                    <h4 id="label1">Força:</h4>
                    <input id="antatb1" type="number" value="0">
                </div>

                <div class="attr">
                    <h4 id="label2">Destreza:</h4>
                    <input id="antatb2" type="number" value="0">
                </div>

                <div class="attr">
                    <h4 id="label3">Constituição:</h4>
                    <input id="antatb3" type="number" value="0">
                </div>

            </div>

            <div class="top-info">

                <div class="field">
                    <h3>Classe:</h3>
                    <select id="class">
                        <option>---</option>
                        <option>Bárbaro</option>
                        <option>Bardo</option>
                        <option>Bruxo</option>
                        <option>Clérigo</option>
                        <option>Druida</option>
                        <option>Feiticeiro</option>
                        <option>Guardião</option>
                        <option>Guerreiro</option>
                        <option>Ladino</option>
                        <option>Mago</option>
                        <option>Monge</option>
                        <option>Paladino</option>
                    </select>
                </div>

                <div class="field">
                    <h3>Nível:</h3>
                    <input id="level" type="number" value="1">
                </div>

                <div class="field">
                    <h3>Tendencia:</h3>
                    <select id="algn">
                        <option>---</option>
                        <option>Leal Bom</option>  
                        <option>Neutro Bom</option>
                        <option>Caótico Bom</option>
                        <option>Leal Neutro</option>
                        <option>Neutro</option>
                        <option>Caótico Neutro</option>
                        <option>Leal Mau</option>
                        <option>Neutro Mau</option>
                        <option>Caótico Mau</option>
                    </select>
                </div>

                <div class="field">
                    <h3>XP:</h3>
                    <input id="xp" type="number" value="0">
                </div>

            </div>


            <h3>Atributos:</h3>

            <div class="attributes">

                <div class="attr">
                    <h4>Força:</h4>
                    <input id="str" type="number" value="10">
                </div>

                <div class="attr">
                    <h4>Destreza:</h4>
                    <input id="dex" type="number" value="10">
                </div>

                <div class="attr">
                    <h4>Constituição:</h4>
                    <input id="con" type="number" value="10">
                </div>

                <div class="attr">
                    <h4>Inteligência:</h4>
                    <input id="int" type="number" value="10">
                </div>

                <div class="attr">
                    <h4>Sabedoria:</h4>
                    <input id="sab" type="number" value="10">
                </div>

                <div class="attr">
                    <h4>Carisma:</h4>
                    <input id="car" type="number" value="10">
                </div>

            </div>

            <button>Gerar Ficha</button>


        </div>
        <div class="sheet" id="sheet"></div>
    </div>

    <script src="script.js"></script>

</body>

</html>
